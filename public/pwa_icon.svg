<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Beautiful Gradients matching the user's Logo -->
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f3c6d" />
      <stop offset="100%" stop-color="#1b75b3" />
    </linearGradient>
    <linearGradient id="green-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e7a3b" />
      <stop offset="100%" stop-color="#55b848" />
    </linearGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4af37" />
      <stop offset="50%" stop-color="#f3e5ab" />
      <stop offset="100%" stop-color="#aa7c11" />
    </linearGradient>
    <linearGradient id="badge-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0e3760" />
      <stop offset="50%" stop-color="#1c6b44" />
      <stop offset="100%" stop-color="#2a8b41" />
    </linearGradient>
    
    <!-- Filters for subtle drop shadows -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Opaque Pure White Background for perfect iOS & Android Launcher rendering -->
  <rect width="512" height="512" rx="112" fill="#ffffff" />

  <!-- Main Circular Container Group -->
  <g transform="translate(0, -10)">
    
    <!-- 1. Outer Circular Blue & Green Sweeping Tracks -->
    <!-- Left Dark Blue Track -->
    <path d="M 120 240 A 150 150 0 0 1 380 140" fill="none" stroke="url(#blue-grad)" stroke-width="14" stroke-linecap="round" opacity="0.9" />
    <!-- Right Golden/Green Track border -->
    <path d="M 380 140 A 150 150 0 0 1 405 240" fill="none" stroke="url(#green-grad)" stroke-width="12" stroke-dasharray="1 1" opacity="0" />
    
    <!-- 2. Central Smartphone -->
    <g transform="translate(196, 75)" filter="url(#shadow)">
      <!-- Outer Phone Body -->
      <rect x="0" y="0" width="120" height="190" rx="18" fill="#ffffff" stroke="url(#blue-grad)" stroke-width="8" />
      <!-- Screen Inner Boundary -->
      <rect x="8" y="16" width="104" height="158" rx="10" fill="#ffffff" />
      <!-- Speaker/Ear Piece -->
      <line x1="45" y1="8" x2="75" y2="8" stroke="url(#blue-grad)" stroke-width="4" stroke-linecap="round" />
      
      <!-- Chart line inside the phone screen -->
      <path d="M 15 130 L 40 90 L 65 110 L 105 50" fill="none" stroke="url(#green-grad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
      <circle cx="105" cy="50" r="5" fill="#55b848" />
    </g>

    <!-- 3. Giant Green Rising Arrow (Main Logo Mark) -->
    <g filter="url(#shadow)">
      <!-- Main body curve of the green arrow -->
      <path d="M 110 240 
               Q 160 210, 205 170 
               T 290 190 
               L 375 105" 
            fill="none" stroke="url(#green-grad)" stroke-width="28" stroke-linecap="round" />
            
      <!-- Arrow Head -->
      <path d="M 345 85 L 395 85 L 395 135 Z" fill="url(#green-grad)" />
      
      <!-- Inner Lightning Bolt Cutout in the arrow -->
      <path d="M 305 173 L 318 160 L 308 160 L 316 148 L 303 161 L 313 161 Z" fill="#ffffff" transform="scale(1.2) translate(-52, -28)" />
    </g>

    <!-- 4. Rotating arrows at the bottom -->
    <!-- Blue Arrow Curve at Bottom -->
    <path d="M 115 250 A 155 155 0 0 0 260 395" fill="none" stroke="url(#blue-grad)" stroke-width="10" stroke-linecap="round" />
    <path d="M 250 388 L 272 395 L 254 412 Z" fill="url(#blue-grad)" />
    
    <!-- Green Arrow Curve at Bottom -->
    <path d="M 250 395 A 155 155 0 0 0 395 250" fill="none" stroke="url(#green-grad)" stroke-width="10" stroke-linecap="round" />
    <path d="M 285 410 A 155 155 0 0 0 310 401" fill="none" stroke="url(#green-grad)" stroke-width="10" stroke-linecap="round" />
    <path d="M 305 388 L 322 405 L 300 415 Z" fill="url(#green-grad)" />

    <!-- 5. Decorative Yellow Lightning on Right -->
    <path d="M 330 200 L 360 230 L 340 230 L 370 270 L 335 240 L 350 240 Z" fill="url(#gold-grad)" filter="url(#shadow)" />
    
    <!-- 6. Golden Shining Star at Top-Right -->
    <path d="M 345 100 Q 345 115, 360 115 Q 345 115, 345 130 Q 345 115, 330 115 Q 345 115, 345 100" fill="url(#gold-grad)" />

    <!-- 7. Main Khmer Text: "លុយឆក&លុយលរ" -->
    <text x="256" y="322" 
          font-family="'Kantumruy Pro', 'Khmer OS Muol Light', 'Hanuman', 'Inter', sans-serif" 
          font-size="52" 
          font-weight="900" 
          fill="#0e3760" 
          text-anchor="middle"
          letter-spacing="-1">លុយឆក&amp;លុយលរ</text>

    <!-- 8. Bottom Badge with "កម្មវិធីកត់ត្រា" -->
    <rect x="136" y="352" width="240" height="48" rx="12" fill="url(#badge-grad)" stroke="#ffffff" stroke-width="2" filter="url(#shadow)" />
    <text x="256" y="384" 
          font-family="'Kantumruy Pro', 'Khmer OS Freehand', 'Hanuman', 'Inter', sans-serif" 
          font-size="22" 
          font-weight="bold" 
          fill="#ffffff" 
          text-anchor="middle">កម្មវិធីកត់ត្រា</text>

    <!-- 9. Thin elegant baseline -->
    <line x1="160" y1="416" x2="352" y2="416" stroke="url(#badge-grad)" stroke-width="3.5" stroke-linecap="round" />
  </g>
</svg>
